<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0f1a">
<title>IronLog — Lift &amp; Burn</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      brand: { 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca' },
      burn:  { 500:'#f97316', 600:'#ea580c' }
    }, fontFamily: { sans: ['Inter','Segoe UI','system-ui','sans-serif'] } } }
  }
</script>
<style>
  html,body{ -webkit-tap-highlight-color:transparent; overscroll-behavior-y:none; }
  body{ font-family:'Inter','Segoe UI',system-ui,sans-serif; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  input[type=number]{ -moz-appearance:textfield; }
  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }
  @keyframes pop{ 0%{transform:scale(.97);opacity:0} 100%{transform:scale(1);opacity:1} }
  .pop{ animation:pop .15s ease-out; }
  @keyframes slideup{ from{transform:translateY(100%)} to{transform:translateY(0)} }
  .slideup{ animation:slideup .22s ease-out; }
  @keyframes fadein{ from{opacity:0} to{opacity:1} }
  .fadein{ animation:fadein .2s ease-out; }
  .ring-prog{ transition:stroke-dashoffset .5s ease; }
</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen pb-24 select-none antialiased">

<div class="max-w-md mx-auto relative min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-30 bg-slate-950/90 backdrop-blur border-b border-slate-800/80 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-burn-600 grid place-items-center text-lg">🏋️</div>
      <div>
        <h1 class="text-base font-extrabold leading-tight tracking-tight">IronLog</h1>
        <p class="text-[11px] text-slate-400 leading-tight" id="headerSub">Lift &amp; Burn</p>
      </div>
    </div>
    <button onclick="openSettings()" class="w-10 h-10 grid place-items-center rounded-xl bg-slate-800 active:bg-slate-700 text-lg">⚙️</button>
  </header>

  <!-- ===== Tab views (rendered by app.js) ===== -->
  <main id="tab-home"     class="tabview p-4 space-y-5"></main>
  <main id="tab-routines" class="tabview p-4 space-y-5 hidden"></main>
  <main id="tab-stats"    class="tabview p-4 space-y-5 hidden"></main>
  <main id="tab-recovery" class="tabview p-4 space-y-5 hidden"></main>

</div>

<!-- ===== Bottom Nav ===== -->
<nav class="fixed bottom-0 left-0 right-0 z-40 max-w-md mx-auto bg-slate-900/95 backdrop-blur border-t border-slate-800">
  <div class="grid grid-cols-4">
    <button data-tab="home"     onclick="switchTab('home')"     class="navbtn flex flex-col items-center gap-0.5 py-2.5 text-brand-400">
      <span class="text-xl">🏠</span><span class="text-[10px] font-semibold">หน้าหลัก</span></button>
    <button data-tab="routines" onclick="switchTab('routines')" class="navbtn flex flex-col items-center gap-0.5 py-2.5 text-slate-500">
      <span class="text-xl">📋</span><span class="text-[10px] font-semibold">โปรแกรม</span></button>
    <button data-tab="stats"    onclick="switchTab('stats')"    class="navbtn flex flex-col items-center gap-0.5 py-2.5 text-slate-500">
      <span class="text-xl">📈</span><span class="text-[10px] font-semibold">สถิติ</span></button>
    <button data-tab="recovery" onclick="switchTab('recovery')" class="navbtn flex flex-col items-center gap-0.5 py-2.5 text-slate-500">
      <span class="text-xl">🛌</span><span class="text-[10px] font-semibold">ฟื้นฟู</span></button>
  </div>
</nav>

<!-- ===== Workout Tracker (full-screen overlay) ===== -->
<div id="trackerView" class="fixed inset-0 z-50 hidden bg-slate-950 overflow-y-auto no-scrollbar">
  <div class="max-w-md mx-auto min-h-screen pb-40">
    <header class="sticky top-0 z-10 bg-slate-950/95 backdrop-blur border-b border-slate-800 px-4 py-3 flex items-center gap-3">
      <button onclick="confirmExitTracker()" class="w-10 h-10 grid place-items-center rounded-xl bg-slate-800 active:bg-slate-700 text-xl">✕</button>
      <div class="flex-1 min-w-0">
        <h2 id="trkTitle" class="text-base font-bold truncate">Workout</h2>
        <p class="text-xs text-slate-400"><span id="trkTimer">00:00</span> · <span id="trkSets">0</span> เซ็ต · <span id="trkVol">0</span> kg vol</p>
      </div>
      <button onclick="openPlateCalc()" class="w-10 h-10 grid place-items-center rounded-xl bg-slate-800 active:bg-slate-700" title="Plate Calculator">🟢</button>
    </header>
    <div id="trkExercises" class="p-4 space-y-4"></div>
    <div class="px-4 space-y-3">
      <button onclick="addExerciseToSession()" class="w-full py-3 rounded-2xl border-2 border-dashed border-slate-700 text-slate-300 font-semibold active:bg-slate-900">+ เพิ่มท่าฝึก</button>
      <button onclick="finishWorkout()" class="w-full py-4 rounded-2xl bg-gradient-to-r from-emerald-500 to-green-600 font-bold text-lg active:scale-[.99] transition shadow-lg shadow-emerald-900/40">✓ เสร็จสิ้น &amp; บันทึก</button>
    </div>
  </div>
</div>

<!-- ===== Rest Timer (bottom sheet, persistent during workout) ===== -->
<div id="restBar" class="fixed bottom-0 left-0 right-0 z-[55] max-w-md mx-auto hidden px-4 pb-4">
  <div class="bg-gradient-to-r from-brand-600 to-brand-700 rounded-2xl p-4 shadow-2xl flex items-center gap-4 slideup">
    <div class="relative w-14 h-14 shrink-0">
      <svg viewBox="0 0 56 56" class="w-14 h-14 -rotate-90">
        <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="5"/>
        <circle id="restRing" cx="28" cy="28" r="24" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="150.8" stroke-dashoffset="0" class="ring-prog"/>
      </svg>
      <span id="restCount" class="absolute inset-0 grid place-items-center text-sm font-bold">60</span>
    </div>
    <div class="flex-1">
      <p class="text-xs text-indigo-200 font-semibold">พักระหว่างเซ็ต</p>
      <div class="flex gap-1.5 mt-1">
        <button onclick="addRest(15)" class="px-2.5 py-1 rounded-lg bg-white/20 text-xs font-bold active:bg-white/30">+15s</button>
        <button onclick="setRest(60)" class="px-2.5 py-1 rounded-lg bg-white/15 text-xs font-bold active:bg-white/30">60</button>
        <button onclick="setRest(90)" class="px-2.5 py-1 rounded-lg bg-white/15 text-xs font-bold active:bg-white/30">90</button>
        <button onclick="setRest(120)" class="px-2.5 py-1 rounded-lg bg-white/15 text-xs font-bold active:bg-white/30">120</button>
      </div>
    </div>
    <button onclick="stopRest()" class="w-10 h-10 grid place-items-center rounded-xl bg-white/20 active:bg-white/30 text-lg shrink-0">⏭</button>
  </div>
</div>

<!-- ===== Generic Bottom-Sheet Modals ===== -->
<!-- Settings -->
<div id="settingsModal" class="modal fixed inset-0 z-[60] hidden">
  <div class="absolute inset-0 bg-black/60" onclick="closeModal('settingsModal')"></div>
  <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 rounded-t-3xl p-5 slideup max-h-[88vh] overflow-y-auto no-scrollbar">
    <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4"></div>
    <h3 class="text-lg font-bold mb-1">ตั้งค่า</h3>
    <p class="text-xs text-slate-400 mb-4">Google Apps Script Web App URL (เก็บในเครื่อง กรอกครั้งเดียว)</p>
    <label class="text-xs font-semibold text-slate-300">Web App URL</label>
    <textarea id="urlInput" rows="3" placeholder="https://script.google.com/macros/s/..../exec"
      class="mt-1 w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2 text-sm focus:border-brand-500 outline-none no-scrollbar"></textarea>

    <h4 class="text-sm font-bold mt-5 mb-2">เป้าหมายต่อสัปดาห์</h4>
    <div class="grid grid-cols-2 gap-2">
      <div><label class="text-[11px] text-slate-400">Steady Cardio (นาที)</label>
        <input id="setSteady" type="number" class="mt-1 w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2 text-base focus:border-brand-500 outline-none"></div>
      <div><label class="text-[11px] text-slate-400">HIIT (เซสชัน)</label>
        <input id="setHiit" type="number" class="mt-1 w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2 text-base focus:border-brand-500 outline-none"></div>
      <div><label class="text-[11px] text-slate-400">เซ็ต/กล้ามเนื้อ (เป้า)</label>
        <input id="setVolTarget" type="number" class="mt-1 w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2 text-base focus:border-brand-500 outline-none"></div>
      <div><label class="text-[11px] text-slate-400">น้ำหนักบาร์ (kg)</label>
        <input id="setBar" type="number" class="mt-1 w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-2 text-base focus:border-brand-500 outline-none"></div>
    </div>

    <div class="flex gap-2 mt-5">
      <button onclick="closeModal('settingsModal')" class="flex-1 py-3 rounded-xl bg-slate-800 active:bg-slate-700 font-semibold">ปิด</button>
      <button onclick="saveSettings()" class="flex-1 py-3 rounded-xl bg-brand-600 active:bg-brand-700 font-semibold">บันทึก</button>
    </div>
    <button onclick="resetAllData()" class="w-full mt-3 py-2 text-xs text-red-400/80">ล้างข้อมูลทั้งหมด</button>
  </div>
</div>

<!-- Generic content sheet (filled by JS) -->
<div id="sheetModal" class="modal fixed inset-0 z-[60] hidden">
  <div class="absolute inset-0 bg-black/60" onclick="closeModal('sheetModal')"></div>
  <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 rounded-t-3xl p-5 slideup max-h-[88vh] overflow-y-auto no-scrollbar">
    <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4"></div>
    <div id="sheetBody"></div>
  </div>
</div>

<!-- Prompt -->
<div id="promptModal" class="modal fixed inset-0 z-[61] hidden">
  <div class="absolute inset-0 bg-black/60" onclick="closePrompt(false)"></div>
  <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 rounded-t-3xl p-5 slideup">
    <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4"></div>
    <h3 id="promptTitle" class="text-lg font-bold mb-3">ชื่อ</h3>
    <input id="promptInput" type="text" autocomplete="off" class="w-full rounded-xl bg-slate-800 border border-slate-700 px-3 py-3 text-base focus:border-brand-500 outline-none">
    <div class="flex gap-2 mt-4">
      <button onclick="closePrompt(false)" class="flex-1 py-3 rounded-xl bg-slate-800 active:bg-slate-700 font-semibold">ยกเลิก</button>
      <button onclick="closePrompt(true)" class="flex-1 py-3 rounded-xl bg-brand-600 active:bg-brand-700 font-semibold">ตกลง</button>
    </div>
  </div>
</div>

<!-- Confirm -->
<div id="confirmModal" class="modal fixed inset-0 z-[61] hidden">
  <div class="absolute inset-0 bg-black/60" onclick="closeConfirm(false)"></div>
  <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 rounded-t-3xl p-5 slideup">
    <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4"></div>
    <h3 id="confirmText" class="text-base font-semibold mb-4">ยืนยัน?</h3>
    <div class="flex gap-2">
      <button onclick="closeConfirm(false)" class="flex-1 py-3 rounded-xl bg-slate-800 active:bg-slate-700 font-semibold">ยกเลิก</button>
      <button id="confirmOkBtn" onclick="closeConfirm(true)" class="flex-1 py-3 rounded-xl bg-red-600 active:bg-red-700 font-semibold">ยืนยัน</button>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loadingOverlay" class="fixed inset-0 z-[70] hidden bg-black/70 grid place-items-center">
  <div class="bg-slate-900 rounded-2xl px-8 py-6 text-center">
    <div class="w-10 h-10 border-4 border-slate-700 border-t-brand-500 rounded-full animate-spin mx-auto"></div>
    <p class="mt-3 text-sm text-slate-300" id="loadingText">กำลังส่งข้อมูล...</p>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[80] hidden px-4 w-full max-w-md">
  <div id="toastInner" class="px-5 py-3 rounded-xl text-sm font-semibold shadow-lg pop text-center"></div>
</div>

<script src="app.js"></script>
</body>
</html>
